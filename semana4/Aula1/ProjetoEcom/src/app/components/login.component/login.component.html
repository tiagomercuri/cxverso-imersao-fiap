<div class="flex items-center justify-center min-h-[70vh]">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-black text-gray-800">Login</h2>
      <p class="text-gray-500 mt-2">Lorem ipsum dolor sit, amet consectetur</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="handleLogin()" class="flex flex-col gap-5">
      
      <div class="flex flex-col gap-1">
        <label class="text-sm font-bold text-gray-700 ml-1">E-mail</label>
        <input 
          formControlName="email" 
          type="email" 
          placeholder="exemplo@email.com"
          class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500 focus:bg-white transition-all"
        >
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-bold text-gray-700 ml-1">Senha</label>
        <input 
          formControlName="password" 
          type="password" 
          placeholder="••••••••"
          class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500 focus:bg-white transition-all"
        >
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid" 
        class="mt-4 w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all disabled:bg-gray-300 disabled:shadow-none disabled:cursor-not-allowed"
      >
        Entrar
      </button>

      <div class="text-center mt-4">
        <p class="text-sm text-gray-400 italic">
          Esqueceu sua senha ? <a href="">clique aqui</a>
        </p>
      </div>
    </form>

  </div>
</div>
